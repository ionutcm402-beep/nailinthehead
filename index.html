<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nail in the Head — Coming Soon</title>
<meta name="description" content="Nail in the Head. The stone always rises. Coming soon.">
<meta property="og:title" content="Nail in the Head">
<meta property="og:description" content="The stone always rises. Coming soon.">
<meta property="og:type" content="website">
<link rel="icon" type="image/png" href="assets/sisyphus.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #060504;
    --gold: #c99a3b;
    --gold-bright: #e7bd5c;
    --gold-deep: #8a6e34;
    --gold-faint: rgba(201, 154, 59, 0.18);
    --text: #d9cfb8;
    --text-dim: #837b69;
    --ember: rgba(231, 189, 92, 0.0);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    background: #000;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    overflow: hidden;
    position: relative;
  }

  /* ---- layered cosmic background ---- */
  .void {
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 120% 80% at 50% 120%, rgba(60,40,12,0.35) 0%, transparent 55%),
      radial-gradient(circle at 50% 42%, #000 0%, #050403 55%, #000 100%);
    z-index: 0;
  }

  canvas#stars {
    position: fixed; inset: 0;
    z-index: 1;
    pointer-events: none;
  }

  /* ---- the breathing ember behind the emblem ---- */
  .ember {
    position: fixed;
    top: 44%; left: 50%;
    width: 70vmin; height: 70vmin;
    transform: translate(-50%, -50%);
    background: radial-gradient(circle, rgba(231,189,92,0.16) 0%, rgba(201,154,59,0.06) 30%, transparent 65%);
    z-index: 2;
    pointer-events: none;
    animation: breathe 6s ease-in-out infinite;
  }

  /* ---- parallax stage ---- */
  .stage {
    position: relative;
    z-index: 3;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 3rem 1.5rem;
    text-align: center;
    will-change: transform;
  }

  .emblem-wrap {
    position: relative;
    opacity: 0;
    animation: rise 1.8s cubic-bezier(.16,1,.3,1) 0.2s forwards;
  }

  .emblem {
    width: min(360px, 72vw);
    height: auto;
    display: block;
    filter: drop-shadow(0 0 60px rgba(201,154,59,0.18));
    -webkit-mask-image: radial-gradient(circle, #000 60%, transparent 88%);
    mask-image: radial-gradient(circle, #000 60%, transparent 88%);
  }

  .eyebrow {
    margin-top: 1.8rem;
    font-weight: 400;
    font-size: 0.7rem;
    letter-spacing: 0.5em;
    text-transform: uppercase;
    color: var(--gold-deep);
    padding-left: 0.5em;
    opacity: 0;
    animation: fade 1.2s ease 1s forwards;
  }

  h1 {
    font-family: 'Cormorant', serif;
    font-weight: 500;
    font-size: clamp(2.8rem, 10vw, 5.2rem);
    line-height: 0.98;
    color: var(--gold);
    margin-top: 0.7rem;
    letter-spacing: 0.005em;
  }
  h1 .word { display: inline-block; opacity: 0; transform: translateY(18px); }
  h1 .word.in { animation: word 1s cubic-bezier(.16,1,.3,1) forwards; }
  h1 em { font-style: italic; color: var(--gold-bright); font-weight: 400; }

  .greek {
    margin-top: 1rem;
    font-family: 'Cormorant', serif;
    font-style: italic;
    font-weight: 300;
    font-size: clamp(0.95rem, 3.4vw, 1.2rem);
    color: var(--text-dim);
    letter-spacing: 0.04em;
    opacity: 0;
    animation: fade 1.4s ease 2.2s forwards;
  }

  .rule {
    width: 0; height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 1.9rem 0 1.6rem;
    animation: spread 1.4s ease 2.4s forwards;
  }

  /* rotating quotes */
  .quote {
    position: relative;
    width: min(34ch, 88vw);
    min-height: 3.6em;
  }
  .quote p {
    position: absolute;
    left: 0; right: 0;
    top: 50%;
    transform: translateY(calc(-50% + 8px));
    font-family: 'Cormorant', serif;
    font-weight: 400;
    font-size: clamp(1.2rem, 4.4vw, 1.55rem);
    line-height: 1.45;
    color: var(--text);
    opacity: 0;
    transition: opacity 1.1s ease, transform 1.1s ease;
    pointer-events: none;
  }
  .quote p.active { opacity: 1; transform: translateY(-50%); }

  .status {
    margin-top: 2.6rem;
    display: flex;
    align-items: center;
    gap: 0.65rem;
    font-size: 0.68rem;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--text-dim);
    opacity: 0;
    animation: fade 1.2s ease 2.8s forwards;
  }
  .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--gold);
    box-shadow: 0 0 10px var(--gold), 0 0 20px rgba(201,154,59,0.5);
    animation: pulse 2.6s ease-in-out infinite;
  }

  footer {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 4;
    padding: 1.6rem;
    display: flex;
    justify-content: center;
    gap: 1.4rem;
    font-size: 0.62rem;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--text-dim);
    opacity: 0;
    animation: fade 1.2s ease 3.2s forwards;
  }
  footer span.dim { color: var(--gold-deep); }

  /* keyframes */
  @keyframes rise {
    from { opacity: 0; transform: translateY(40px) scale(0.94); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  @keyframes fade { to { opacity: 1; } }
  @keyframes word { to { opacity: 1; transform: translateY(0); } }
  @keyframes spread { to { width: 110px; } }
  @keyframes breathe {
    0%, 100% { transform: translate(-50%,-50%) scale(1); opacity: 0.85; }
    50% { transform: translate(-50%,-50%) scale(1.12); opacity: 1; }
  }
  @keyframes pulse {
    0%,100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.35; transform: scale(0.7); }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition: none !important; }
    .emblem-wrap, .eyebrow, .greek, .status, footer { opacity: 1 !important; }
    h1 .word { opacity: 1 !important; transform: none !important; }
    .rule { width: 110px !important; }
    .ember { animation: none !important; }
    canvas#stars { display: none; }
  }
</style>
</head>
<body>
  <div class="void"></div>
  <canvas id="stars"></canvas>
  <div class="ember"></div>

  <main class="stage" id="stage">
    <div class="emblem-wrap">
      <img class="emblem" src="assets/sisyphus.png" alt="Sisyphus pushing a boulder uphill">
    </div>

    <p class="eyebrow">Nail in the Head</p>
    <h1 id="title"><span class="word">The</span> <span class="word">Stone</span> <span class="word"><em>Rises</em></span></h1>
    <p class="greek">&#955;&#8054;&#952;&#959;&#962; &#7936;&#949;&#943; &#8005; &#8001; &#955;&#943;&#952;&#959;&#962; &#7936;&#957;&#945;&#946;&#945;&#943;&#957;&#949;&#953;</p>

    <div class="rule"></div>

    <div class="quote" id="quote">
      <p data-i="0">One must imagine the work already underway.</p>
      <p data-i="1">Effort, repeated, becomes a kind of fire.</p>
      <p data-i="2">The summit is not the point. The push is.</p>
      <p data-i="3">Something deliberate is on its way up the hill.</p>
    </div>

    <div class="status">
      <span class="dot"></span>
      <span>Coming Soon</span>
    </div>
  </main>

  <footer>
    <span class="dim">nailinthehead.org</span>
  </footer>

  <script>
    const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    /* ---------- starfield ---------- */
    if (!reduce) {
      const canvas = document.getElementById('stars');
      const ctx = canvas.getContext('2d');
      let w, h, stars = [], motes = [];
      const DPR = Math.min(window.devicePixelRatio || 1, 2);

      function resize() {
        w = canvas.width = innerWidth * DPR;
        h = canvas.height = innerHeight * DPR;
        canvas.style.width = innerWidth + 'px';
        canvas.style.height = innerHeight + 'px';
        const count = Math.floor((innerWidth * innerHeight) / 7000);
        stars = Array.from({length: count}, () => ({
          x: Math.random()*w, y: Math.random()*h,
          r: (Math.random()*1.1 + 0.2) * DPR,
          base: Math.random()*0.5 + 0.15,
          tw: Math.random()*0.02 + 0.004,
          ph: Math.random()*Math.PI*2,
          gold: Math.random() < 0.18
        }));
        const moteCount = Math.floor(innerWidth / 28);
        motes = Array.from({length: moteCount}, () => ({
          x: Math.random()*w, y: Math.random()*h,
          r: (Math.random()*1.6 + 0.4) * DPR,
          vy: -(Math.random()*0.25 + 0.05) * DPR,
          vx: (Math.random()-0.5)*0.12 * DPR,
          a: Math.random()*0.35 + 0.08,
          ph: Math.random()*Math.PI*2
        }));
      }
      window.addEventListener('resize', resize);
      resize();

      let t = 0;
      function draw() {
        ctx.clearRect(0,0,w,h);
        t += 0.016;
        // stars
        for (const s of stars) {
          const a = s.base + Math.sin(t*60*s.tw + s.ph) * s.base * 0.6;
          ctx.beginPath();
          ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
          ctx.fillStyle = s.gold
            ? `rgba(231,189,92,${Math.max(0,a)})`
            : `rgba(220,210,190,${Math.max(0,a*0.8)})`;
          ctx.fill();
        }
        // rising gold dust
        for (const m of motes) {
          m.y += m.vy; m.x += m.vx + Math.sin(t + m.ph)*0.15*DPR;
          if (m.y < -10) { m.y = h + 10; m.x = Math.random()*w; }
          const flick = m.a + Math.sin(t*2 + m.ph)*0.06;
          ctx.beginPath();
          ctx.arc(m.x, m.y, m.r, 0, Math.PI*2);
          ctx.fillStyle = `rgba(201,154,59,${Math.max(0,flick)})`;
          ctx.fill();
        }
        requestAnimationFrame(draw);
      }
      draw();
    }

    /* ---------- staggered title words ---------- */
    const words = document.querySelectorAll('#title .word');
    words.forEach((wd, i) => setTimeout(() => wd.classList.add('in'), 1200 + i*220));

    /* ---------- rotating quotes ---------- */
    const quotes = [...document.querySelectorAll('#quote p')];
    let qi = 0;
    function showQuote(i) {
      quotes.forEach(q => q.classList.remove('active'));
      quotes[i].classList.add('active');
    }
    setTimeout(() => {
      showQuote(0);
      setInterval(() => { qi = (qi+1) % quotes.length; showQuote(qi); }, 5200);
    }, 3000);

    /* ---------- cursor parallax ---------- */
    if (!reduce && window.matchMedia('(pointer:fine)').matches) {
      const stage = document.getElementById('stage');
      const ember = document.querySelector('.ember');
      let tx=0, ty=0, cx=0, cy=0;
      window.addEventListener('mousemove', e => {
        tx = (e.clientX / innerWidth - 0.5);
        ty = (e.clientY / innerHeight - 0.5);
      });
      (function loop(){
        cx += (tx-cx)*0.05; cy += (ty-cy)*0.05;
        stage.style.transform = `translate(${cx*-14}px, ${cy*-10}px)`;
        ember.style.marginLeft = `${cx*30}px`;
        ember.style.marginTop = `${cy*30}px`;
        requestAnimationFrame(loop);
      })();
    }
  </script>
</body>
</html>
